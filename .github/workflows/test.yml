name: test

on: [push, pull_request]

permissions:
  contents: read

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: |
            webui/requirements.txt
            webui/requirements-dev.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r webui/requirements.txt -r webui/requirements-dev.txt
          # The tests import BeautifulSoup/lxml via webui/link_rewrite.py;
          # these live in the upstream wayback_archive package which we do
          # not pull into CI.
          pip install beautifulsoup4 lxml

      - name: Run pytest
        run: pytest
