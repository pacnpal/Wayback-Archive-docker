version: 2
updates:
  - package-ecosystem: pip
    directory: /webui
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      runtime:
        patterns: ["*"]
        exclude-patterns: ["pytest*"]
      dev:
        patterns: ["pytest*"]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 3
    # Covers both Dockerfile and Dockerfile.playwright in the repo root.
