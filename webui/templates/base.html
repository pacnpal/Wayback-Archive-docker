<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Wayback Archive{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="icon" href="/static/favicon.png?v=2" type="image/png" sizes="256x256">
<link rel="icon" href="/favicon.ico?v=2" type="image/x-icon" sizes="any">
<link rel="apple-touch-icon" href="/static/favicon.png?v=2">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<meta name="htmx-config" content='{"noSwap": [204, 304, "4xx", "5xx"], "defaultTimeout": 0, "transitions": true}'>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta1/dist/htmx.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta1/dist/ext/hx-sse.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta1/dist/ext/hx-preload.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/htmx.org@4.0.0-beta1/dist/ext/hx-browser-indicator.min.js"></script>
<style>
  body { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; }
  nav ul { display: flex; gap: 1rem; list-style: none; padding: 0; }
  .status-ok { color: #2a9d8f; } .status-error { color: #e63946; }
  .status-running { color: #e9c46a; } .status-pending { color: #888; }
  .status-cancelled { color: #8a8a8a; font-style: italic; }
  table { font-size: 0.9rem; }
  .ts-cell { font-size: 0.78rem; white-space: nowrap; line-height: 1.2; }
  .type-cell { width: 3rem; text-align: center; }
  .type-badge { display: inline-block; min-width: 2rem; padding: 1px 6px; border-radius: 999px; font-size: .7rem; font-weight: 700; letter-spacing: .05em; text-align: center; line-height: 1.4; }
  .type-badge.archive { background: #e0f2fe; color: #0369a1; }
  .type-badge.repair  { background: #fef3c7; color: #a16207; }
  .list-toolbar { display: flex; gap: 1rem; align-items: end; flex-wrap: wrap; margin: .3rem 0 .6rem; }
  .list-toolbar > * { margin: 0; }
  .inline-filter { display: flex; gap: .6rem; align-items: end; flex-wrap: nowrap; margin: 0; }
  .filter-select { display: inline-flex; flex-direction: column; margin: 0; gap: .1rem; }
  .filter-select > span { font-size: .7rem; color: var(--pico-muted-color); text-transform: uppercase; letter-spacing: .05em; }
  .filter-select select { margin: 0; padding: .2rem .4rem; min-width: 7rem; width: auto; }
  .multi-combo { position: relative; display: inline-block; min-width: 9rem; }
  .multi-combo__trigger { display: flex; align-items: center; justify-content: space-between; gap: .4rem; padding: .25rem .5rem; border: 1px solid var(--pico-muted-border-color); border-radius: .3rem; background: var(--pico-form-element-background-color, var(--pico-background-color)); cursor: pointer; font-size: .9rem; min-height: 2.1rem; line-height: 1.2; user-select: none; }
  .multi-combo__trigger:after { content: "▾"; font-size: .75rem; color: var(--pico-muted-color); }
  .multi-combo__label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; max-width: 14rem; }
  .multi-combo__menu { position: absolute; top: calc(100% + 2px); left: 0; z-index: 20; background: var(--pico-background-color); border: 1px solid var(--pico-muted-border-color); border-radius: .3rem; box-shadow: 0 4px 14px rgba(0,0,0,.15); min-width: 100%; max-height: 16rem; overflow-y: auto; padding: .3rem; display: none; }
  .multi-combo.open .multi-combo__menu { display: block; }
  .multi-combo__menu label { display: flex; align-items: center; gap: .5rem; padding: .25rem .4rem; border-radius: .2rem; cursor: pointer; font-size: .85rem; margin: 0; white-space: nowrap; }
  .multi-combo__menu label:hover { background: rgba(127,127,127,.12); }
  .multi-combo__menu input[type=checkbox] { margin: 0; }
  .per-page-wrap { display: inline-flex; align-items: center; gap: .3rem; font-size: .78rem; color: var(--pico-muted-color); text-transform: uppercase; letter-spacing: .05em; }
  .per-page-wrap select { margin: 0; padding: .15rem .4rem; width: auto; }
  .table-scroll { overflow-x: auto; margin: 0 -.25rem; padding: 0 .25rem; }
  #toast { position: fixed; right: 1rem; bottom: 1rem; max-width: 22rem; padding: .6rem 1rem; background: #c62828; color: #fff; border-radius: .4rem; box-shadow: 0 4px 14px rgba(0,0,0,.3); font-size: .9rem; z-index: 9999; opacity: 0; transform: translateY(1rem); transition: opacity .15s, transform .15s; pointer-events: none; }
  #toast.show { opacity: 1; transform: translateY(0); pointer-events: auto; }
  .pager { display: flex; gap: .4rem; align-items: center; justify-content: center; margin-top: .5rem; flex-wrap: wrap; }

  /* Schedule builder */
  .sched-card { border: 1px solid var(--pico-muted-border-color); border-radius: .6rem; padding: 1rem 1.25rem; margin: 0 0 1.2rem; background: var(--pico-background-color); }
  .sched-card > h3 { margin: 0 0 .8rem; font-size: 1rem; }
  .sched-card label { margin: 0; }
  .sched-row { display: flex; gap: 1rem; flex-wrap: wrap; align-items: flex-end; }
  .sched-tabs { display: flex; gap: 0; margin: .2rem 0 .9rem; border-bottom: 1px solid var(--pico-muted-border-color); }
  .sched-tabs a { padding: .4rem .9rem; border: 1px solid transparent; border-bottom: none; border-radius: .35rem .35rem 0 0; font-size: .9rem; color: var(--pico-muted-color); text-decoration: none; margin-bottom: -1px; }
  .sched-tabs a.active { color: var(--pico-color); background: var(--pico-background-color); border-color: var(--pico-muted-border-color); border-bottom-color: var(--pico-background-color); }
  .freq-picker { display: flex; gap: .4rem; flex-wrap: wrap; padding: 0; border: 0; margin: 0 0 .9rem; }
  .freq-picker legend { display: none; }
  .freq-picker label { border: 1px solid var(--pico-muted-border-color); border-radius: 999px; padding: .3rem .8rem; cursor: pointer; font-size: .9rem; user-select: none; }
  .freq-picker input { position: absolute; opacity: 0; pointer-events: none; }
  .freq-picker label:has(input:checked) { background: #2563eb; color: #fff; border-color: #2563eb; }
  .dow-row { display: flex; gap: .3rem; flex-wrap: wrap; padding: 0; border: 0; margin: 0; }
  .dow-row legend { display: none; }
  .dow-row label { border: 1px solid var(--pico-muted-border-color); border-radius: .35rem; padding: .3rem .6rem; font-size: .82rem; min-width: 2.6rem; text-align: center; cursor: pointer; }
  .dow-row label:has(input:checked) { background: #2563eb; color: #fff; border-color: #2563eb; }
  .dow-row input { position: absolute; opacity: 0; pointer-events: none; }
  .sched-preview { margin: 1rem 0 .2rem; padding: .6rem .9rem; border-radius: .4rem; background: rgba(37,99,235,.08); border-left: 3px solid #2563eb; font-size: .9rem; min-height: 2.5rem; }
  .sched-preview .cron { font-family: ui-monospace, monospace; color: var(--pico-muted-color); font-size: .78rem; margin-top: .2rem; }
  .sched-actions { display: flex; align-items: center; gap: 1rem; margin-top: 1rem; flex-wrap: wrap; }
  .sched-actions small { color: var(--pico-muted-color); }
  @media (max-width: 600px) {
    body { margin: .5rem auto; padding: 0 .5rem; }
    .list-toolbar { gap: .4rem; }
    .inline-filter { flex-wrap: wrap; gap: .4rem; }
    .filter-select select { min-width: 5rem; }
    .ts-cell { font-size: 0.7rem; }
    .secondary { min-height: 2rem; }
    nav ul { flex-wrap: wrap; row-gap: .2rem; }
  }
  .audit-loading, .audit-pending { color: var(--pico-muted-color); }
  .audit-pending::after { content: ""; display: inline-block; width: .6em; height: .6em; margin-left: .3em; border: 2px solid currentColor; border-right-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; vertical-align: middle; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .progress-bar { height: 4px; background: var(--pico-muted-border-color); border-radius: 2px; margin-top: 2px; overflow: hidden; }
  .progress-bar span { display: block; height: 100%; background: #2a9d8f; transition: width .3s; }
  .mono, code, pre { font-family: ui-monospace, monospace; }
  pre.log { max-height: 300px; overflow: auto; background: #111; color: #ddd; padding: .5rem; }
  .tree { font-family: ui-monospace, monospace; line-height: 1.6; }
  .tree a { text-decoration: none; }
  .diff-add { background: #d4edda; } .diff-del { background: #f8d7da; }
  .diff-table { width: 100%; font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .diff-table td { padding: 0 .3rem; vertical-align: top; white-space: pre-wrap; }
  #wayback-banner-slot:empty { display: none; }
  .wayback-banner { margin: .6rem 0 1rem; padding: .6rem .9rem; border-radius: .4rem; background: #fff4e5; border-left: 4px solid #d97706; color: #7c2d12; font-size: .9rem; line-height: 1.5; }
  .wayback-banner .banner-counts { display: inline-block; margin-left: .6rem; font-size: .78rem; color: #9a3412; opacity: .8; }
  .wayback-banner .banner-retry { margin-left: .6rem; padding: .15rem .7rem; font-size: .8rem; border-radius: .3rem; border: 1px solid #d97706; background: #fff; color: #7c2d12; cursor: pointer; }
  .wayback-banner .banner-retry:hover { background: #ffedd5; }
  .wayback-banner .banner-retry.htmx-request { opacity: .5; cursor: progress; }
</style>
</head>
<body hx-sse:connect="/events">
<nav>
  <ul>
    <li><strong>🗄 Wayback Archive</strong></li>
    <li><a href="/" preload>Dashboard</a></li>
    <li><a href="/sites" preload>Sites</a></li>
    <li><a href="/snapshots" preload>Snapshots</a></li>
    <li><a href="/schedules" preload>Schedules</a></li>
  </ul>
</nav>
<div id="wayback-banner-slot"
     hx-get="/api/wayback-status"
     hx-trigger="load, every 30s, sse:wayback-state-changed"
     hx-swap="innerHTML"></div>
<main>{% block content %}{% endblock %}</main>
<footer style="margin:2rem 0 1rem;padding-top:.8rem;border-top:1px solid var(--pico-muted-border-color);display:flex;justify-content:space-between;align-items:center;gap:1rem;flex-wrap:wrap;font-size:.78rem;color:var(--pico-muted-color)">
  <a href="{{ request.app.state.github_url }}" target="_blank" rel="noopener"
     style="color:inherit;display:inline-flex;align-items:center;gap:.35rem;text-decoration:none">
    <svg viewBox="0 0 16 16" width="14" height="14" fill="currentColor" aria-hidden="true">
      <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0 0 16 8c0-4.42-3.58-8-8-8z"/>
    </svg>
    <span>pacnpal/Wayback-Archive-Dashboard</span>
  </a>
  <span class="mono">{{ request.app.state.version }}</span>
</footer>
<div id="toast" role="status" aria-live="polite"></div>
<script>
(function setupComboboxes() {
  function setup(box) {
    if (box.dataset.wired) return;
    box.dataset.wired = "1";
    const trigger = box.querySelector('.multi-combo__trigger');
    const label = box.querySelector('.multi-combo__label');
    const defaultLbl = box.dataset.label || 'Any';
    const refresh = () => {
      const checked = [...box.querySelectorAll('input[type=checkbox]:checked')].map(c => c.value);
      if (!checked.length) label.textContent = defaultLbl;
      else if (checked.length === 1) label.textContent = checked[0];
      else label.textContent = checked.length + ' selected';
    };
    trigger.addEventListener('click', e => {
      e.preventDefault();
      document.querySelectorAll('.multi-combo.open').forEach(o => { if (o !== box) o.classList.remove('open'); });
      box.classList.toggle('open');
    });
    box.addEventListener('change', refresh);
    refresh();
  }
  document.addEventListener('click', e => {
    document.querySelectorAll('.multi-combo.open').forEach(box => {
      if (!box.contains(e.target)) box.classList.remove('open');
    });
  });
  htmx.onLoad(root => (root.querySelectorAll ? root : document)
    .querySelectorAll('.multi-combo').forEach(setup));
})();

// Error toast: htmx 4 unifies request/swap/timeout errors under htmx:error.
(function setupErrorToast() {
  const toast = document.getElementById('toast');
  let hideTimer = null;
  function show(msg) {
    toast.textContent = msg;
    toast.classList.add('show');
    clearTimeout(hideTimer);
    hideTimer = setTimeout(() => toast.classList.remove('show'), 4000);
  }
  document.body.addEventListener('htmx:error', e => {
    const ctx = e.detail?.ctx || {};
    const status = ctx.response?.status;
    const statusText = ctx.response?.statusText;
    if (status === 0 || !status) show('Network error — server unreachable');
    else show(`Error ${status}${statusText ? ': ' + statusText : ''}`);
  });
})();
</script>
</body>
</html>
