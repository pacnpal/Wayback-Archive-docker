<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}Wayback Archive{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@picocss/pico@2/css/pico.min.css">
<script src="https://unpkg.com/htmx.org@1.9.12"></script>
<style>
  body { max-width: 1200px; margin: 1rem auto; padding: 0 1rem; }
  nav ul { display: flex; gap: 1rem; list-style: none; padding: 0; }
  .status-ok { color: #2a9d8f; } .status-error { color: #e63946; }
  .status-running { color: #e9c46a; } .status-pending { color: #888; }
  .status-cancelled { color: #8a8a8a; font-style: italic; }
  table { font-size: 0.9rem; }
  .ts-cell { font-size: 0.78rem; white-space: nowrap; line-height: 1.2; }
  .type-cell { width: 3rem; text-align: center; }
  .type-badge { display: inline-block; min-width: 2rem; padding: 1px 6px; border-radius: 999px; font-size: .7rem; font-weight: 700; letter-spacing: .05em; text-align: center; line-height: 1.4; }
  .type-badge.archive { background: #e0f2fe; color: #0369a1; }
  .type-badge.repair  { background: #fef3c7; color: #a16207; }
  .list-toolbar { display: flex; gap: 1rem; align-items: end; flex-wrap: wrap; margin: .3rem 0 .6rem; }
  .list-toolbar > * { margin: 0; }
  .inline-filter { display: flex; gap: .6rem; align-items: end; flex-wrap: nowrap; margin: 0; }
  .filter-select { display: inline-flex; flex-direction: column; margin: 0; gap: .1rem; }
  .filter-select > span { font-size: .7rem; color: var(--pico-muted-color); text-transform: uppercase; letter-spacing: .05em; }
  .filter-select select { margin: 0; padding: .2rem .4rem; min-width: 7rem; width: auto; }
  .filter-select select.multi-combo { min-height: 2.1rem; padding-right: 1.5rem; background-image: linear-gradient(45deg, transparent 50%, var(--pico-muted-color) 50%), linear-gradient(135deg, var(--pico-muted-color) 50%, transparent 50%); background-position: calc(100% - 12px) 50%, calc(100% - 7px) 50%; background-size: 5px 5px, 5px 5px; background-repeat: no-repeat; }
  .per-page-wrap { display: inline-flex; align-items: center; gap: .3rem; font-size: .78rem; color: var(--pico-muted-color); text-transform: uppercase; letter-spacing: .05em; }
  .per-page-wrap select { margin: 0; padding: .15rem .4rem; width: auto; }
  .table-scroll { overflow-x: auto; margin: 0 -.25rem; padding: 0 .25rem; }
  .pager { display: flex; gap: .4rem; align-items: center; justify-content: center; margin-top: .5rem; flex-wrap: wrap; }
  @media (max-width: 600px) {
    body { margin: .5rem auto; padding: 0 .5rem; }
    .list-toolbar { gap: .4rem; }
    .inline-filter { flex-wrap: wrap; gap: .4rem; }
    .filter-select select { min-width: 5rem; }
    .ts-cell { font-size: 0.7rem; }
    .secondary { min-height: 2rem; }
    nav ul { flex-wrap: wrap; row-gap: .2rem; }
  }
  .progress-bar { height: 4px; background: var(--pico-muted-border-color); border-radius: 2px; margin-top: 2px; overflow: hidden; }
  .progress-bar span { display: block; height: 100%; background: #2a9d8f; transition: width .3s; }
  .mono, code, pre { font-family: ui-monospace, monospace; }
  pre.log { max-height: 300px; overflow: auto; background: #111; color: #ddd; padding: .5rem; }
  .tree { font-family: ui-monospace, monospace; line-height: 1.6; }
  .tree a { text-decoration: none; }
  .diff-add { background: #d4edda; } .diff-del { background: #f8d7da; }
  .diff-table { width: 100%; font-family: ui-monospace, monospace; font-size: 0.8rem; }
  .diff-table td { padding: 0 .3rem; vertical-align: top; white-space: pre-wrap; }
</style>
</head>
<body>
<nav>
  <ul>
    <li><strong>🗄 Wayback Archive</strong></li>
    <li><a href="/">Dashboard</a></li>
    <li><a href="/sites">Sites</a></li>
    <li><a href="/snapshots">Snapshots</a></li>
    <li><a href="/schedules">Schedules</a></li>
  </ul>
</nav>
<main>{% block content %}{% endblock %}</main>
</body>
</html>
